<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VSeed Demo</title>

     <script src="https://cdn.jsdelivr.net/npm/@visactor/vseed/dist/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@visactor/vchart/build/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@visactor/vtable/dist/vtable.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        background-color: #f8fafc;
        min-height: 100vh;
        padding: 24px;
      }
      .page {
        max-width: 1400px;
        margin: 0 auto;
      }
      header {
        margin-bottom: 24px;
        text-align: center;
      }
      header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 8px;
      }
      header p {
        color: #64748b;
        font-size: 15px;
      }
      .editor-container {
        display: flex;
        flex-direction: column;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
        border: 1px solid #e2e8f0;
        overflow: hidden;
      }
      .code-panel {
        background: #1e293b;
        display: flex;
        flex-direction: column;
      }
      .code-panel.is-hidden {
        display: none;
      }
      .preview-panel {
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        padding: 20px;
        display: flex;
        flex-direction: column;
      }
      .editor-container.is-code-hidden .preview-panel {
        border-bottom: none;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
      }
      .editor-container.is-code-hidden .chart-container {
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        overflow: hidden;
      }
      .panel-header {
        padding: 12px 20px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        flex-shrink: 0;
      }
      .panel-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .code-panel .panel-header {
        background: #0f172a;
        color: #64748b;
        border-bottom: 1px solid #334155;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .preview-panel .panel-header {
        background: #f8fafc;
        color: #64748b;
        border-bottom: 1px solid #e2e8f0;
        margin: -20px -20px 20px -20px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .code-editor {
        flex: 1;
        min-height: 800px;
        overflow: auto;
        padding: 16px;
      }
      .code-editor textarea {
        width: 100%;
        height: 100%;
        min-height: 750px;
        background: transparent;
        border: none;
        color: #e2e8f0;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 13px;
        line-height: 1.6;
        resize: none;
        outline: none;
      }
      .chart-container {
        height: 400px;
        position: relative;
      }
      #chart {
        width: 100%;
        height: 100%;
      }
      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .info-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 14px;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04);
      }
      .info-card h3 {
        font-size: 14px;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .info-card p {
        color: #475569;
        font-size: 13px;
        line-height: 1.6;
      }
      .edit-hint {
        background: rgba(96, 165, 250, 0.15);
        color: #60a5fa;
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 12px;
        font-weight: 600;
      }
      .validation-result {
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .validation-success {
        background: #dcfce7;
        color: #166534;
      }
      .validation-error {
        background: #fee2e2;
        color: #991b1b;
      }
      .btn {
        padding: 8px 16px;
        border-radius: 6px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #3b82f6;
        color: #fff;
      }
      .btn-primary:hover {
        background: #2563eb;
      }
      .btn-secondary {
        background: #1e293b;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn-secondary:hover {
        background: #0f172a;
      }

      body.is-dark {
        background-color: #0f172a;
      }
      body.is-dark header h1 {
        color: #f1f5f9;
      }
      body.is-dark header p {
        color: #94a3b8;
      }
      body.is-dark .editor-container {
        background: #1e293b;
        border-color: #334155;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      body.is-dark .preview-panel {
        background: #1e293b;
        border-bottom-color: #334155;
      }
      body.is-dark .preview-panel .panel-header {
        background: #0f172a;
        color: #94a3b8;
        border-bottom-color: #334155;
      }
      body.is-dark .chart-container {
        background: #1e293b;
      }
      body.is-dark .info-card {
        background: #1e293b;
        border-color: #334155;
      }
      body.is-dark .info-card h3 {
        color: #f1f5f9;
      }
      body.is-dark .info-card p {
        color: #94a3b8;
      }
      body.is-dark .validation-success {
        background: #064e3b;
        color: #6ee7b7;
      }
      body.is-dark .validation-error {
        background: #7f1d1d;
        color: #fca5a5;
      }

      body.is-light {
        background-color: #f8fafc;
      }
      body.is-light header h1 {
        color: #1e293b;
      }
      body.is-light header p {
        color: #64748b;
      }
      body.is-light .editor-container {
        background: #fff;
        border-color: #e2e8f0;
        box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
      }
      body.is-light .preview-panel {
        background: #fff;
        border-bottom-color: #e2e8f0;
      }
      body.is-light .preview-panel .panel-header {
        background: #f8fafc;
        color: #64748b;
        border-bottom-color: #e2e8f0;
      }
      body.is-light .chart-container {
        background: #fff;
      }
      body.is-light .info-card {
        background: #fff;
        border-color: #e2e8f0;
      }
      body.is-light .info-card h3 {
        color: #0f172a;
      }
      body.is-light .info-card p {
        color: #475569;
      }
      body.is-light .validation-success {
        background: #dcfce7;
        color: #166534;
      }
      body.is-light .validation-error {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <h1 id="chart-title">📊 {{title}}</h1>
        <p>{{description}}</p>
      </header>

      <div class="editor-container">
        <div class="preview-panel">
          <div class="panel-header">
            <span>预览</span>
            <div class="panel-header-actions">
              <button class="btn btn-secondary" onclick="downloadImage()">下载图片</button>
              <button class="btn btn-secondary" id="toggle-code-btn" onclick="toggleCodePanel()">显示代码</button>
            </div>
          </div>
          <div id="validation-result" class="validation-result" style="display: none;"></div>
          <div class="chart-container">
            <div id="chart"></div>
          </div>
        </div>
        <div class="code-panel is-hidden">
          <div class="panel-header">
            <span>Schema 配置</span>
          </div>
          <div class="code-editor">
            <textarea id="code-input" spellcheck="false"></textarea>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ====== SCHEMA_START ======
       {{schema}}

      // ====== SCHEMA_END ======

      // ===== CUSTOM_THEME_CONFIG_START ======
      {{custom_theme_config}}
      // ===== CUSTOM_THEME_CONFIG_END ======

      let chartInstance = null;
      let isCodePanelVisible = false;
      const validateThemeNames = [];

      // 初始化代码编辑器
      document.getElementById('code-input').value = JSON.stringify(schema, null, 2);

      function setCodePanelVisibility(visible) {
        const editorContainer = document.querySelector('.editor-container');
        const codePanel = document.querySelector('.code-panel');
        const toggleButton = document.getElementById('toggle-code-btn');
        if (!editorContainer || !codePanel || !toggleButton) {
          return;
        }
        isCodePanelVisible = visible;
        codePanel.classList.toggle('is-hidden', !visible);
        editorContainer.classList.toggle('is-code-hidden', !visible);
        toggleButton.textContent = visible ? '隐藏代码' : '显示代码';
      }

      // 初始化时设置代码面板默认隐藏状态标志
      document.addEventListener('DOMContentLoaded', function() {
        const editorContainer = document.querySelector('.editor-container');
        if (editorContainer) {
          editorContainer.classList.add('is-code-hidden');
        }
      });

      function toggleCodePanel() {
        setCodePanelVisibility(!isCodePanelVisible);
      }

      function showDownloadError(message) {
        const resultEl = document.getElementById('validation-result');
        resultEl.className = 'validation-result validation-error';
        resultEl.textContent = message;
        resultEl.style.display = 'block';
      }

      function downloadImage() {
        const container = document.getElementById('chart');
        if (!container) {
          showDownloadError('✗ 未找到图表容器');
          return;
        }

        const canvas = container.querySelector('canvas');

        if (canvas && canvas.toDataURL) {
          const dataUrl = canvas.toDataURL('image/png');
          const link = document.createElement('a');
          link.href = dataUrl;
          const title = document.getElementById('chart-title').textContent || 'chart';
          link.download = title.replace('📊 ', '') + '.png';
          link.click();
          return;
        }

        showDownloadError('✗ 当前图表无法导出图片');
      }

      function validateSchema(schemaToValidate) {
        const resultEl = document.getElementById('validation-result');
        
        try {
          // 使用 zVSeed 进行验证
          const result = VSeed.zVSeed.safeParse(schemaToValidate);
          
          if (result.success) {
            resultEl.className = 'validation-result validation-success';
            resultEl.textContent = '✓ Schema 验证通过';
            resultEl.style.display = 'none';
            return true;
          } else {
            resultEl.className = 'validation-result validation-error';
            resultEl.textContent = '✗ 验证失败: ' + JSON.stringify(result.error?.issues || result.error, null, 2);
            resultEl.style.display = 'block';
            return false;
          }
        } catch (e) {
          resultEl.className = 'validation-result validation-error';
          resultEl.textContent = '✗ 验证异常: ' + e.message;
          resultEl.style.display = 'block';
          return false;
        }
      }

      function registerThemeByType(name, baseTheme, themeConfig) {
        VSeed.registerCustomTheme(name, () => {
          const customTheme = {
            config: {},
          };

          const colorScheme = themeConfig?.colorScheme || [
            "#3370eb", "#1bcebf", "#ffc60a", "#ed6d0c", "#dca1e4",
            "#25b2e5", "#6dcdeb", "#288fcb", "#94b5f5", "#8f61d1"
          ];
          
          const linearColorScheme = themeConfig?.linearColorScheme || ["#f7fbff", "#08519c"];
          const positiveColor = themeConfig?.positiveColor || '#ff5f1a';
          const negativeColor = themeConfig?.negativeColor || '#2dbeab';
          const barMaxWidth = 52;
          const barLikeChartTypes = ['bar', 'column', 'columnPercent', 'columnParallel', 'barPercent', 'barParallel'];

          const baseConfig = baseTheme.config || {};
          Object.keys(baseConfig).forEach(key => {
            customTheme.config[key] = {
              ...baseConfig[key],
              color: {
                ...baseConfig[key].color,
                colorScheme: colorScheme,
                linearColorScheme: linearColorScheme,
                positiveColor: positiveColor,
                negativeColor: negativeColor
              }
            };

            if (customTheme.config[key].player) {
              const playerColor = colorScheme[0];
              customTheme.config[key].player.trackColor = playerColor;
              customTheme.config[key].player.sliderHandleBorderColor = playerColor;
              customTheme.config[key].player.startButtonColor = playerColor; 
              customTheme.config[key].player.pauseButtonColor = playerColor; 
              customTheme.config[key].player.backwardButtonColor = playerColor; 
              customTheme.config[key].player.forwardButtonColor = playerColor; 
            }

            if (barLikeChartTypes.includes(key) || key === 'dualAxis') {
              customTheme.config[key].barMaxWidth = barMaxWidth;
            }

            if (key === 'boxPlot') {
              customTheme.config[key].boxMaxWidth = barMaxWidth;
            }
          });

          if (themeConfig?.backgroundColor) {
            customTheme.background = themeConfig.backgroundColor;
          }
          
          return customTheme;
        });
      }

      function registerDefaultTheme() {
        // 注册内置主题
        registerThemeByType('dark', VSeed.darkTheme(), {
          colorScheme: ["#3370eb", "#1bcebf", "#ffc60a", "#ed6d0c", "#dca1e4", "#25b2e5", "#52c41a", "#f14e5a", "#8e5cf7", "#ff9c6e"]
        });
        registerThemeByType('light', VSeed.lightTheme(), {
          colorScheme: [
            '#1dadff', '#45e171', '#b284f0', '#6380e8', '#f7bb55', 
            '#f17853', '#29e9d1', '#ff6ad5', '#f95d6a', '#aef432'
          ]
        });

        validateThemeNames.push('dark');
        validateThemeNames.push('light');

        // 注册自定义主题（从 custom_theme_config 占位符读取）
        if (customThemeConfig && typeof customThemeConfig === 'object') {
          Object.keys(customThemeConfig).forEach(themeName => {
            const themeConfig = customThemeConfig[themeName];
            if (!themeConfig) return;

            validateThemeNames.push(themeName);
            
            // 根据 isDark 选择基础主题
            const baseTheme = themeConfig.isDark ? VSeed.darkTheme() : VSeed.lightTheme();
            
            // 注册自定义主题，传入除 isDark 外的其他配置
            const { isDark, ...themeSettings } = themeConfig;
            registerThemeByType(themeName, baseTheme, themeSettings);
          });
        }
      }

      // 获取当前系统主题（light 或 dark）
      function getSystemTheme() {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          return 'dark';
        }
        return 'light';
      }

      function resolveThemeMode(schemaConfig) {
        if (schemaConfig?.theme && customThemeConfig?.[schemaConfig.theme]) {
          const isDark = customThemeConfig[schemaConfig.theme]?.isDark;
          if (isDark === true) return 'dark';
          if (isDark === false) return 'light';
        }

        if (schemaConfig?.theme === 'dark' || schemaConfig?.theme === 'light') {
          return schemaConfig.theme;
        }

        return getSystemTheme();
      }

      function applyPageTheme(mode) {
        document.body.classList.toggle('is-dark', mode === 'dark');
        document.body.classList.toggle('is-light', mode === 'light');
      }

      function renderChart() {
        const codeInput = document.getElementById('code-input').value;
        
        let parsedSchema;
        try {
          parsedSchema = JSON.parse(codeInput);
        } catch (e) {
          const resultEl = document.getElementById('validation-result');
          resultEl.className = 'validation-result validation-error';
          resultEl.textContent = '✗ JSON 解析错误: ' + e.message;
          resultEl.style.display = 'block';
          return;
        }

        // 验证 schema
        const isValid = validateSchema(parsedSchema);
        
        if (!isValid) {
          return;
        }

        // 销毁旧图表
        if (chartInstance) {
          chartInstance.release();
          chartInstance = null;
        }

        // 清空容器
        document.getElementById('chart').innerHTML = '';

        // 渲染新图表
        const {
          VSeed,
          Builder,
          isPivotChart,
          isVChart,
          isPivotTable,
          isTable,
          zVSeed,
          ColorIdEncoding,
          DATUM_HIDE_KEY,
        } = window.VSeed
        const { ListTable, PivotTable, PivotChart } = window.VTable;
        const { VChart } = window.VChart;

        const preferredTheme = resolveThemeMode(parsedSchema);
        applyPageTheme(preferredTheme);

        // 如果用户未指定主题，则根据系统主题自动设置
        if (!parsedSchema.theme || !validateThemeNames.includes(parsedSchema.theme)) {
          parsedSchema.theme = preferredTheme;
        }

        const container = document.getElementById('chart')
        const builder = Builder.from(parsedSchema)
        let spec = builder.build()

        if (isPivotChart(parsedSchema)) {
          chartInstance = new PivotChart(container, spec)

          chartInstance.on('legend_item_click', (args) => {
            console.log('LEGEND_ITEM_CLICK', args)
            chartInstance.updateFilterRules([
              {
                filterKey: ColorIdEncoding,
                filteredValues: args.value,
              },
            ])
          })   

          chartInstance.on('legend_change', (args) => {
            const maxValue = args.value[1]
            const minValue = args.value[0]

            if (vseed.chartType === 'heatmap') {
              chartInstance.updateFilterRules([
                {
                  filterFunc: (record) => {
                    const value = record[record[ColorIdEncoding]]
                    const isShow = value >= minValue && value <= maxValue

                    record[DATUM_HIDE_KEY] = !isShow

                    return true
                  },
                },
              ])
            } else {
              chartInstance.updateFilterRules([
                {
                  filterFunc: (record) => {
                    const value = record[record[ColorIdEncoding]]
                    if (value >= minValue && value <= maxValue) {
                      return true
                    }
                    return false
                  },
                },
              ])
            }
          })
          window.pivotChart = chartInstance
        } else if (isVChart(parsedSchema)) {
          chartInstance = new VChart(spec, { dom: container})
          chartInstance.renderSync()

          chartInstance.on('brushEnd', (e) => {
            console.log(e)
          })

          window.vchart = chartInstance
        } else if (isTable(parsedSchema)) {
          chartInstance = new ListTable(container, spec)
          window.table = chartInstance
        } else if (isPivotTable(parsedSchema)) {
          chartInstance = new PivotTable(container, spec)

          window.table = chartInstance
        }
      }

      // 页面加载时自动渲染
      window.onload = function() {
        // 渲染新图表
        const {
          registerAll,
        } = window.VSeed
        const { register } = window.VTable;
        const { VChart } = window.VChart;

        registerAll();
        registerDefaultTheme(); // 覆盖默认的两套主题
        register.chartModule('vchart', VChart)

        renderChart();
        
        // 添加编辑器实时更新监听
        const codeInput = document.getElementById('code-input');
        let debounceTimer = null;
        
        // 使用防抖处理，避免频繁重新渲染
        codeInput.addEventListener('input', function() {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            renderChart();
          }, 500); // 500ms 延迟
        });
        
        // 也可以监听键盘事件，提供更好的响应
        codeInput.addEventListener('keyup', function(e) {
          // Ctrl+Enter 立即渲染
          if (e.ctrlKey && e.key === 'Enter') {
            clearTimeout(debounceTimer);
            renderChart();
          }
        });

        // 监听系统主题变化，自动重新渲染图表
        if (window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
            renderChart();
          });
        }
      };
    </script>
  </body>
</html>
