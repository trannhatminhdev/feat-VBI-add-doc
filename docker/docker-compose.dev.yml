services:
  vbi_fe:
    build:
      context: ..
      dockerfile: docker/vbi_fe/Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ../apps/vbi_fe/src:/app/apps/vbi_fe/src
      - ../apps/vbi_fe/public:/app/apps/vbi_fe/public
      - ../apps/vbi_fe/rsbuild.config.ts:/app/apps/vbi_fe/rsbuild.config.ts
      - ../packages:/app/packages
      - ../practices:/app/practices
    environment:
      - NODE_ENV=development
    depends_on:
      - vbi_be
    restart: unless-stopped
    networks:
      - vbi_net

  vbi_be:
    build:
      context: ..
      dockerfile: docker/vbi_be/Dockerfile.dev
    command: pnpm --filter vbi_be start:debug
    ports:
      - '3030:3030'
      - '9229:9229'
      - '1234:1234'
    volumes:
      - ../apps/vbi_be/src:/app/apps/vbi_be/src
      - ../apps/vbi_be/test:/app/apps/vbi_be/test
      - ../packages:/app/packages
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - vbi_net

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - PGPORT=5454
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5454:5454'
    networks:
      - vbi_net

volumes:
  postgres_data:

networks:
  vbi_net:
