name: vbi-prod

services:
  vbi_fe:
    build:
      context: ..
      dockerfile: docker/vbi_fe/Dockerfile
    ports:
      - '${VBI_FE_PORT:-3000}:80'
    depends_on:
      vbi_be:
        condition: service_started
    restart: unless-stopped
    networks:
      - vbi_net

  vbi_be:
    build:
      context: ..
      dockerfile: docker/vbi_be/Dockerfile
    ports:
      - '${VBI_BE_PORT:-3030}:3030'
      - '${VBI_COLLAB_PORT:-1234}:1234'
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DATABASE_URL: ''
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vbi_net

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PGPORT: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${VBI_DB_PORT:-5454}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -p "$$PGPORT"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - vbi_net

volumes:
  postgres_data:

networks:
  vbi_net:
